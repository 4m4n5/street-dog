# Codex project config — Street Dog
#
# Do NOT define [mcp_servers] here. Project-local entries override ~/.codex/config.toml
# and a relative command path will break MCP startup in the VS Code extension.
#
# One-time per machine (from repo root):
#
#   codex mcp remove godot 2>/dev/null; codex mcp add godot \
#     --env GODOT_PATH=/Applications/Godot.app/Contents/MacOS/Godot \
#     -- "$(pwd)/scripts/mcp/godot-catalyst.sh"
#
# Trust (in ~/.codex/config.toml):
#   [projects."/absolute/path/to/street-dog"]
#   trust_level = "trusted"
#
# Verify: codex mcp list  → command must be ABSOLUTE path, status enabled
# Then: fully quit and reopen VS Code/Cursor (not just reload window)
